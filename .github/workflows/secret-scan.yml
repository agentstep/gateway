name: Secret scan

# Defense-in-depth against ever re-committing credentials.
# Runs on every PR and push; a finding fails the job.
#
# History note: pre-0.3.1 tags contained committed SQLite DBs with
# plaintext vault entries. All keys were rotated and history was
# rewritten in April 2026. This scan exists so that can't happen again.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly drift check — catches anything committed directly on main
    # by a human who forgot to go through a PR.
    - cron: "0 7 * * 1"

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed so gitleaks can scan the full history
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No GITLEAKS_LICENSE needed for public repos.

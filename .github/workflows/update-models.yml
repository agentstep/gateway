name: Update model catalog

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 6am UTC
  workflow_dispatch: # Manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and curate model catalog
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # 1. Fetch full LiteLLM catalog
          curl -sL https://raw.githubusercontent.com/BerriAI/litellm/main/model_prices_and_context_window.json \
            -o /tmp/full-catalog.json
          FULL=$(python3 -c "import json; print(len(json.load(open('/tmp/full-catalog.json'))))")
          echo "Full catalog: $FULL models"

          # 2. Pre-filter: keep only chat models from Anthropic, OpenAI, Google
          python3 -c "
          import json
          catalog = json.load(open('/tmp/full-catalog.json'))
          providers = {'anthropic', 'openai', 'vertex_ai', 'vertex_ai-language-models', 'gemini'}
          prefixes = ('claude-', 'gpt-', 'o1-', 'o3-', 'o4-', 'chatgpt-', 'codex-', 'gemini-')
          skip = ('image', 'tts', 'audio', 'transcribe', 'realtime', 'embedding', 'search-api', 'diarize')
          filtered = {}
          for k, v in catalog.items():
              p = v.get('litellm_provider', '')
              if p not in providers: continue
              if not any(k.startswith(x) for x in prefixes): continue
              if any(s in k for s in skip): continue
              filtered[k] = v
          json.dump(filtered, open('/tmp/pre-filtered.json', 'w'), indent=2)
          print(f'Pre-filtered: {len(filtered)} models')
          "

          # 3. Claude curates the final list via Anthropic API
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            pip install anthropic -q
            python3 -c "
          import json
          from anthropic import Anthropic

          catalog = json.load(open('/tmp/pre-filtered.json'))
          model_ids = sorted(catalog.keys())
          client = Anthropic()

          msg = client.messages.create(
              model='claude-sonnet-4-6',
              max_tokens=4096,
              messages=[{
                  'role': 'user',
                  'content': '''Curate this model list for a coding agent gateway. Return ONLY the IDs to keep, one per line.

          RULES:
          - Keep ALL versions in the current generation of each model family
          - Anthropic: keep claude-4.x only (haiku-4-5, sonnet-4-5/4-6, opus-4-5/4-6/4-7). Remove ALL claude-3.x.
          - OpenAI: keep gpt-4.1+, ALL gpt-5.x, codex-mini-latest, o1-pro, o3-mini/pro, o4-mini. Remove gpt-3.5, gpt-4, gpt-4o, chatgpt-4o.
          - Google: keep gemini-2.0+, 2.5+, 3.x. Include flash, pro, and -lite variants.
          - Remove date-stamped models (20240307, 20250219, etc.)
          - Remove -001 suffixes, -latest (except codex-mini-latest), -chat-latest, -experimental
          - Keep deep-research variants

          ''' + chr(10).join(model_ids)
              }],
          )

          kept = [l.strip() for l in msg.content[0].text.strip().split(chr(10)) if l.strip() and l.strip() in catalog]
          curated = {k: catalog[k] for k in kept}
          json.dump(curated, open('/tmp/curated.json', 'w'), indent=2)
          print(f'Curated: {len(curated)} models (from {len(catalog)})')
          "

            if [ -f /tmp/curated.json ] && python3 -c "import json; json.load(open('/tmp/curated.json'))" 2>/dev/null; then
              cp /tmp/curated.json packages/agent-sdk/src/lib/model-catalog.json
              TOTAL=$(python3 -c "import json; print(len(json.load(open('/tmp/curated.json'))))")
              echo "Curated: $TOTAL models"
            else
              echo "Curation failed — using pre-filtered list"
              cp /tmp/pre-filtered.json packages/agent-sdk/src/lib/model-catalog.json
              TOTAL=$(python3 -c "import json; print(len(json.load(open('/tmp/pre-filtered.json'))))")
            fi
          else
            echo "No ANTHROPIC_API_KEY — using pre-filtered list"
            cp /tmp/pre-filtered.json packages/agent-sdk/src/lib/model-catalog.json
            TOTAL=$(python3 -c "import json; print(len(json.load(open('/tmp/pre-filtered.json'))))")
          fi

          echo "Final catalog: $TOTAL models"
          echo "TOTAL=$TOTAL" >> $GITHUB_ENV

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet packages/agent-sdk/src/lib/model-catalog.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="chore/update-model-catalog-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"
          git add packages/agent-sdk/src/lib/model-catalog.json
          git commit -m "chore: update model catalog (${{ env.TOTAL }} models)"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: update model catalog (${{ env.TOTAL }} models)" \
            --body "Auto-updated from [LiteLLM model_prices_and_context_window.json](https://github.com/BerriAI/litellm/blob/main/model_prices_and_context_window.json)." \
            --base main
        env:
          GH_TOKEN: ${{ github.token }}
